<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoang Ngan | Portfolio</title>
   
    <style>
        body { 
            font-family: 'Quicksand', sans-serif; 
            background-color: #fdfaf5; 
            color: #4a4a4a;}
    
        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.8)), 
                        url('https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=1200');
            background-size: cover;
            background-position: center;}

        .profile-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 600px;
            border: 1px solid #eee;}

        h1 { font-family: 'Montserrat', sans-serif; font-weight: 700; color: #5d7a5c; }
        .class-tag { color: #8a8a8a; font-weight: 500; letter-spacing: 2px; }

    /
        .nav-buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-custom {
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            display: inline-block;}

        .btn-food {
            background-color: #ffdaaf; 
            color: #b07021;}

        .btn-travel {
            background-color: #d4e4bc; 
            color: #4a633a;}

        .btn-custom:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            opacity: 0.9;}

        .hobby-text {
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.6;}
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container d-flex justify-content-center">
            <div class="profile-card">
                <p class="class-tag">STUDENT OF DA25NNAC</p>
                <h1>Nguyễn Hoàng Ngân</h1>
                <p class="hobby-text">
                    Chào mọi người! Mình là Hoàng Ngân. Niềm đam mê lớn nhất của mình là 
                    <strong>thưởng thức những món ăn ngon</strong> và 
                    <strong>xách ba lô đi du lịch</strong> đến những vùng đất mới.
                </p>
                <hr class="my-4" style="opacity: 0.1;">
                <p class="text-muted small mb-4">Khám phá thế giới của mình qua 1 chuyên mục sau </p>
                    <a href="travel.html" class="btn-custom btn-travel">
                        ✈️ My Travels
                    </a>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
